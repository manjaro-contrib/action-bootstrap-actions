name: bootstrap
on: 
  workflow_dispatch:
  schedule:
    - cron:  '0 1-23/2 * * *'

jobs:
  bootstrap_actions:
    runs-on: ubuntu-latest
    permissions: write-all
    steps:
      - name: checkout
        uses: actions/checkout@4f1f4aec02e41874fa0262ea8ff5172d7978ad1e # main
        with:
          token: ${{ secrets.BOOTSTRAP_WORKFLOWS || github.token }}
      - id: bootstrap
        uses: manjaro-contrib/action-bootstrap-actions@main
        with:
          upstream: __UPSTREAM__
